<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1600" />
  <title>BayWash · Condo car wash app</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { margin: 0; height: 100%; background: #f0eee9; font-family: 'Geist', system-ui, sans-serif; }
    body { overscroll-behavior: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // Defensive: clear any stale DesignCanvas viewport state before mount,
    // so we never land at an offscreen pan from a prior dev session.
    try {
      Object.keys(localStorage)
        .filter(k => k.startsWith('dc-viewport'))
        .forEach(k => localStorage.removeItem(k));
    } catch {}
  </script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="android-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="screens-auth.jsx"></script>
  <script type="text/babel" src="screens-home.jsx"></script>
  <script type="text/babel" src="screens-booking.jsx"></script>

  <script type="text/babel">
    const {
      DesignCanvas, DCSection, DCArtboard,
      IOSDevice, AndroidDevice,
      TweaksPanel, TweakSection, TweakColor, TweakSelect, TweakToggle, TweakRadio,
      useTweaks,
      ScreenLogin, ScreenSignUp, ScreenHome,
      ScreenLocation, ScreenVehicle, ScreenContact, ScreenSchedule, ScreenConfirm,
    } = window;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "palette": "blue",
      "font": "geist",
      "showActive": false
    }/*EDITMODE-END*/;

    const PALETTES = {
      "default": { label: 'Olive Green', cls: '' },
      "ink":     { label: 'Ink (Dark)',  cls: 'theme-ink' },
      "blue":    { label: 'Cobalt',      cls: 'theme-blue' },
      "orange":  { label: 'Sunset',      cls: 'theme-orange' },
      "mono":    { label: 'Monochrome',  cls: 'theme-mono' },
    };
    const FONTS = {
      "geist":   { label: 'Geist + Instrument Serif', cls: 'font-geist' },
      "grotesk": { label: 'Space Grotesk',            cls: 'font-grotesk' },
      "mono":    { label: 'Geist Mono (Editorial)',   cls: 'font-mono' },
    };

    function App() {
      const [tw, setTw] = useTweaks(TWEAK_DEFAULTS);
      const theme = PALETTES[tw.palette]?.cls || '';
      const font  = FONTS[tw.font]?.cls || '';
      const props = { theme, font, showActive: tw.showActive };

      // Each screen gets rendered both as a "naked" board and inside iOS / Android frames.
      // To keep the canvas tight we lay it out as:
      //   row 1: Auth (Login, Sign Up)         on iOS + Android
      //   row 2: Home + Active wash on iOS + Android
      //   row 3: Booking flow steps 1–4         on iOS
      //   row 4: Confirmation                   on iOS + Android
      // Width 390x844 ≈ iPhone 14, 412x892 ≈ Pixel.

      const ios = (Screen, extra = {}) => (
        <IOSDevice width={390} height={844} dark={tw.palette === 'ink'}>
          <Screen {...props} {...extra} />
        </IOSDevice>
      );
      const and = (Screen, extra = {}) => (
        <AndroidDevice width={412} height={892} dark={tw.palette === 'ink'}>
          <Screen {...props} {...extra} />
        </AndroidDevice>
      );

      return (
        <>
          <DesignCanvas>
            {/* ── 1. Auth ─────────────────────────────────── */}
            <DCSection id="auth" title="Authentication" subtitle="Login + Sign Up — minimal centred layout">
              <DCArtboard id="login-ios"  label="Login · iOS"     width={420} height={890}>
                <div style={{ width: 420, height: 890, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  {ios(ScreenLogin)}
                </div>
              </DCArtboard>
              <DCArtboard id="signup-ios" label="Sign Up · iOS"   width={420} height={890}>
                <div style={{ width: 420, height: 890, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  {ios(ScreenSignUp)}
                </div>
              </DCArtboard>
              <DCArtboard id="login-and"  label="Login · Android" width={440} height={920}>
                <div style={{ width: 440, height: 920, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  {and(ScreenLogin)}
                </div>
              </DCArtboard>
              <DCArtboard id="signup-and" label="Sign Up · Android" width={440} height={920}>
                <div style={{ width: 440, height: 920, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  {and(ScreenSignUp)}
                </div>
              </DCArtboard>
            </DCSection>

            {/* ── 2. Home ─────────────────────────────────── */}
            <DCSection id="home" title="Home" subtitle="Service selection · live wash status">
              <DCArtboard id="home-ios" label="Home · iOS"        width={420} height={890}>
                <div style={{ width: 420, height: 890, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  {ios(ScreenHome)}
                </div>
              </DCArtboard>
              <DCArtboard id="home-empty" label="Home · No active" width={420} height={890}>
                <div style={{ width: 420, height: 890, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  {ios(ScreenHome, { showActive: false })}
                </div>
              </DCArtboard>
              <DCArtboard id="home-and" label="Home · Android"    width={440} height={920}>
                <div style={{ width: 440, height: 920, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  {and(ScreenHome)}
                </div>
              </DCArtboard>
            </DCSection>

            {/* ── 3. Booking flow ─────────────────────────── */}
            <DCSection id="booking" title="Booking flow" subtitle="2 steps · where & what → when & how">
              <DCArtboard id="loc-ios" label="1 · Where & what" width={420} height={890}>
                <div style={{ width: 420, height: 890, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  {ios(ScreenLocation)}
                </div>
              </DCArtboard>
              <DCArtboard id="sch-ios" label="2 · When & how" width={420} height={890}>
                <div style={{ width: 420, height: 890, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  {ios(ScreenSchedule)}
                </div>
              </DCArtboard>
              <DCArtboard id="loc-and" label="1 · Where & what · Android" width={440} height={920}>
                <div style={{ width: 440, height: 920, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  {and(ScreenLocation)}
                </div>
              </DCArtboard>
              <DCArtboard id="sch-and" label="2 · When & how · Android" width={440} height={920}>
                <div style={{ width: 440, height: 920, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  {and(ScreenSchedule)}
                </div>
              </DCArtboard>
            </DCSection>

            {/* ── 4. Confirmation ─────────────────────────── */}
            <DCSection id="confirm" title="Confirmation" subtitle="Booking summary · notify toggle · pay">
              <DCArtboard id="conf-ios" label="Confirm · iOS"     width={420} height={890}>
                <div style={{ width: 420, height: 890, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  {ios(ScreenConfirm)}
                </div>
              </DCArtboard>
              <DCArtboard id="conf-and" label="Confirm · Android" width={440} height={920}>
                <div style={{ width: 440, height: 920, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  {and(ScreenConfirm)}
                </div>
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="BayWash · Tweaks">
            <TweakSection label="Color palette">
              <TweakSelect
                label="Palette"
                value={tw.palette}
                options={Object.entries(PALETTES).map(([v, p]) => ({ value: v, label: p.label }))}
                onChange={(v) => setTw('palette', v)}
              />
            </TweakSection>
            <TweakSection label="Typography">
              <TweakSelect
                label="Font pairing"
                value={tw.font}
                options={Object.entries(FONTS).map(([v, f]) => ({ value: v, label: f.label }))}
                onChange={(v) => setTw('font', v)}
              />
            </TweakSection>
            <TweakSection label="Home">
              <TweakToggle
                label="Show active wash"
                value={tw.showActive}
                onChange={(v) => setTw('showActive', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
